<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
  <div id="persegi"></div>
  <div id="bujur"></div>
  <div id="segitiga"></div>
</body>
<script>
    //persegi
    const panjang = 25;
    const lebar = 10;
    //menghitung panjang dan lebar dari rumus luas persegi
    let luaspersegi = panjang * lebar;
    //menampilkan ke halaman web melalui nama id persegi
    let hasilpersegi = document.getElementById('persegi');
    hasilpersegi.innerHTML = 
    `<p>luaspersegi = ${luaspersegi} </p> `;
    //bujur sangkar
    const sisi = 15;
    //menghitung luas bujur sangkar dengan rumus sisi kali sisi
    let luasbujursangkar = sisi * sisi;
    //menampilkan ke halaman web hasil luas bujur sangkar melalui nama id bujur
    let hasilbujursangkar = document.getElementById('bujur');
    hasilbujursangkar.innerHTML = 
    `<p>luas bujur sangkar = ${luasbujursangkar}</p>`;
    //segitiga
    const tinggi = 10;
    const alas = 15;
    //menghitung segitiga dengan rumus 1/2 x alas x tinggi
    let luassegitiga = 0.5 * alas * tinggi;
    //menampilkan hasil ke halaman web melalui nama id segitiga
    let hasilsegitiga = document.getElementById('segitiga');
    hasilsegitiga.innerHTML = 
    `<p>luas segitiga = ${luassegitiga}</p>`;
</script>
</html>
